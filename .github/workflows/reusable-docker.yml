name: Reusable Docker Build and Push

on:
  workflow_call:
    inputs:
      image_name:
        description: "Docker image name"
        required: true
        type: string

      tag:
        description: "Docker image tag"
        required: true
        type: string

    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

    outputs:
      image_url:
        description: "URL of the pushed Docker image"
        value: ${{ jobs.docker-build.outputs.image_url }}

jobs:
  docker-build:
    runs-on: ubuntu-latest

    outputs:
      image_url: ${{ steps.set-output.outputs.image_url }}

    steps:
      # ✅ Checkout
      - name: Code Checkout
        uses: actions/checkout@v4

      # ✅ Login
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ✅ Build & Push
      - name: Build & Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
                ${{ secrets.DOCKERHUB_USER }}/github-actions-app:${{ github.ref_name }}
                ${{ secrets.DOCKERHUB_USER }}/github-actions-app:latest
                ${{ secrets.DOCKERHUB_USER }}/github-actions-app:${{ github.sha}}

      # ✅ Output
      - name: Set image URL output
        id: set-output
        run: |
          echo "image_url=${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:${{ inputs.tag }}" >> $GITHUB_OUTPUT