name: PR Pipeline

on:
    pull_request:
        branches: [main]
        types: [ opened, synchronize ]


jobs:   
    build-test:
        runs-on: ubuntu-latest
        steps:
            - name: use reusable-build-test.yml
              uses: ./.github/workflows/reusable-build-test.yml
              with:
                python_version: "3.13"
                Run tests: true

    pr-commit:
        runs-on: ubuntu-latest
        needs: build-test
        
        steps:
            - name: Print PR summary
              run: |
                echo "PR check passed for branch : ${{ github.head-ref }}"