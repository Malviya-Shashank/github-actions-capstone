name: Reusable Build and Test

on:
    push:
        branches: [main]
    workflow_call:
        inputs:
            python_version:
                description: "python version"
                required: true
                type: string    

            run_test:
                description: "Run tests or not"
                required: false
                type: boolean    

        outputs:
            test_result:
                description: "Result of the test execution"
                value: ${{ jobs.build-test.outputs.test_result }}    
       
jobs:
    build-test:
        runs-on: ubuntu-latest

        outputs: 
            test_result: ${{ steps.set-result.outputs.result }}

        
        steps:
            # Code Scan
            - name: Checkout Code
              uses: actions/checkout@v4

            # Setup language at run time
            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: ${{ inputs.python_version }}


            # install dependencies
            - name: install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt

            # Run tests (only if run_tests is true)
            - name: Run tets
              id: run-tets
              if: ${{ inputs.run_test }} 
              run: |
                pytest
              continue-on-error: true  

            # Set output: test_result with value passed or faile
            - name: Set test result
              id: set-result
              run: |
                if [ "${{ inputs.run_tests || 'true' }}" = "false" ]; then
                    echo "result=skipped" >> $GITHUB_OUTPUT
                elif [ "${{ steps.run-tests.outcome }}" = "success" ]; then
                    echo "result=passed" >> $GITHUB_OUTPUT
                else
                    echo "result=failed" >> $GITHUB_OUTPUT
                fi




          